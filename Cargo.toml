[package]
name = "yamtam-rt"
version = "1.2.0"
edition = "2024"
description = "YAMTAM Runtime — safety CLI for AI agents: scan, graph, vault, hunt, ci, map, fix, doctor"
license = "Apache-2.0"
repository = "https://github.com/phamlongh230-lgtm/yamtam-engine"
homepage = "https://phamlongh230-lgtm.github.io/yamtam-engine"
documentation = "https://github.com/phamlongh230-lgtm/yamtam-engine#readme"
keywords = ["ai-safety", "claude-code", "security", "agent", "cli"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"
exclude = ["core/skills/*", "docs/*", ".claude/*", "target/*"]

[[bin]]
name = "yamtam-rt"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
shell-words = "1"
regex      = "1"
glob       = "0.3"
walkdir    = "2"
serde_yaml = "0.9"
anyhow     = "1"
unicode-normalization = "0.1"
liteparse = { version = "2", default-features = false }
ureq      = "2"

[dev-dependencies]
tempfile = "3"

