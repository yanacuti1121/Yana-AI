[package]
name = "yamtam-rt"
version = "0.5.0"
edition = "2024"
description = "YAMTAM Runtime — task lifecycle, evals, evidence schema"

[[bin]]
name = "yamtam-rt"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

