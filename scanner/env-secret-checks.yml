# scanner/env-secret-checks.yml
# Checks for exposed secrets and risky patterns in .env files and source code.

version: "1.0"
scope: secrets

file_patterns:
  - ".env"
  - ".env.*"
  - "*.env"
  - "**/*.js"
  - "**/*.ts"
  - "**/*.py"
  - "**/*.go"
  - "**/*.java"
  - "**/*.rb"
  - "**/*.php"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.json"
  - "**/*.toml"
  - "**/*.ini"
  - "**/*.conf"
  - "**/*.config"

exclude_patterns:
  - "node_modules/**"
  - ".git/**"
  - "dist/**"
  - "build/**"
  - "*.test.*"
  - "*.spec.*"
  - "*.example"
  - "*.sample"
  - "scanner/**"
  - "core/gates/**"
  - "core/hooks/**"
  - "core/scripts/**"
  - "core/tests/**"
  - ".claude/hooks/**"
  - "docs/**"
  - "reports/**"

checks:

  - id: SE001
    severity: CRITICAL
    description: "Anthropic / Claude API key exposed"
    match:
      type: regex
      pattern: "sk-ant-[a-zA-Z0-9\\-_]{20,}"
    reason: "Live Anthropic API key committed to the repo. Immediately rotatable but must be rotated now."
    fix: "Rotate the key immediately at console.anthropic.com. Move to environment variable or secret manager."

  - id: SE002
    severity: CRITICAL
    description: "OpenAI API key exposed"
    match:
      type: regex
      pattern: "sk-(?:proj-|[a-zA-Z0-9])[a-zA-Z0-9\\-_]{20,}(?<!ant)"
    reason: "Live OpenAI API key in source code."
    fix: "Rotate at platform.openai.com/api-keys. Use OPENAI_API_KEY env var."

  - id: SE003
    severity: CRITICAL
    description: "GitHub personal access token (classic or fine-grained)"
    match:
      type: regex
      pattern: "(ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{82})"
    reason: "GitHub PAT can be used to push code, read private repos, or impersonate the user."
    fix: "Revoke at github.com/settings/tokens. Use GitHub Actions secrets or a vault."

  - id: SE004
    severity: CRITICAL
    description: "AWS access key ID + secret pattern"
    match:
      type: regex
      pattern: "AKIA[0-9A-Z]{16}"
    reason: "AWS access key committed to repo. Can be used to access cloud resources immediately."
    fix: "Deactivate in AWS IAM console. Use IAM roles or AWS Secrets Manager."

  - id: SE005
    severity: CRITICAL
    description: "Private key block (RSA, EC, OpenSSH)"
    match:
      type: regex
      pattern: "-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----"
    reason: "Private key in source code exposes authentication credentials permanently (even after deletion from git history)."
    fix: "Remove and rotate immediately. Use git-filter-repo to purge from history. Store in a vault."

  - id: SE006
    severity: HIGH
    description: "Stripe secret key"
    match:
      type: regex
      pattern: "sk_(live|test)_[a-zA-Z0-9]{24,}"
    reason: "Stripe secret key allows creating charges and accessing customer data."
    fix: "Rotate at dashboard.stripe.com/apikeys. Never commit payment keys."

  - id: SE007
    severity: HIGH
    description: "Google API key or service account credential"
    match:
      type: regex
      pattern: "(AIza[0-9A-Za-z\\-_]{35}|\"type\":\\s*\"service_account\")"
    reason: "Google API keys can enable billing charges. Service account JSON grants full GCP access."
    fix: "Restrict key in Google Cloud Console. Use Application Default Credentials instead."

  - id: SE008
    severity: HIGH
    description: "Slack webhook URL or bot token"
    match:
      type: regex
      pattern: "(https://hooks\\.slack\\.com/services/[A-Z0-9/]{40,}|xox[bpoa]-[0-9]{10,}-[a-zA-Z0-9-]{20,})"
    reason: "Slack tokens allow sending messages as your app or user to all workspaces they belong to."
    fix: "Regenerate in api.slack.com/apps. Use Slack secrets management."

  - id: SE009
    severity: HIGH
    description: "Database connection string with credentials embedded"
    match:
      type: regex
      pattern: "(postgres|mysql|mongodb|redis):\\/\\/[^:]+:[^@]+@"
      flags: "i"
    reason: "Connection strings with passwords expose database credentials to anyone with repo access."
    fix: "Use DATABASE_URL env var without the password, or use IAM authentication."

  - id: SE010
    severity: HIGH
    description: "JWT secret or signing key hardcoded"
    match:
      type: regex
      pattern: "(jwt.?secret|signing.?key|token.?secret)\\s*[=:]\\s*[\"'][^\"']{8,}[\"']"
      flags: "i"
    reason: "Hardcoded JWT secret allows anyone to forge valid tokens for your application."
    fix: "Generate a strong random secret and load from environment: process.env.JWT_SECRET."

  - id: SE011
    severity: MEDIUM
    description: ".env file contains non-placeholder values that look like real secrets"
    target_extensions: [".env", ".env.local", ".env.production", ".env.staging"]
    match:
      type: regex
      pattern: "^[A-Z_]+=(?!your_|example_|replace_|changeme|<|\\$\\{|__)[a-zA-Z0-9+/]{16,}$"
      flags: "m"
    reason: ".env files with real-looking values may be accidentally committed."
    fix: "Ensure .env is in .gitignore. Commit only .env.example with placeholder values."

  - id: SE012
    severity: MEDIUM
    description: "Password or secret assigned as string literal in source code"
    match:
      type: regex
      pattern: "(password|passwd|secret|api_key|apikey|auth_token)\\s*[=:]\\s*[\"'][^\"'$\\{]{6,}[\"']"
      flags: "i"
    reason: "Hardcoded credentials in source code are difficult to rotate and persist in git history."
    fix: "Load all credentials from environment variables. Throw on startup if the variable is missing."

  - id: SE013
    severity: LOW
    description: "TODO comment referencing credentials or secrets"
    match:
      type: regex
      pattern: "(TODO|FIXME|HACK).*?(key|secret|password|token|credential)"
      flags: "i"
    reason: "TODOs about secrets often indicate a temporary hardcoded value that was never cleaned up."
    fix: "Resolve the TODO before merging. Do not leave credential management as a future task."
