# scanner/auth-credential-checks.yml
# Checks for auth boundary violations and credential exposure.
# Inspired by google-auth-library-nodejs + google-api-nodejs-client patterns:
# OAuth2 for user delegation, service accounts for machine identity,
# JWT for signed assertions. Each auth type has a different risk profile.

version: "1.0"
scope: auth-credentials

file_patterns:
  - "**/*.json"
  - "**/*.yml"
  - "**/*.yaml"
  - "**/*.env"
  - "**/.env*"
  - "**/*.env.*"
  - "**/*.md"
  - "**/*.sh"
  - "**/*.ts"
  - "**/*.js"
  - "**/*.py"

exclude_patterns:
  - "node_modules/**"
  - ".git/**"
  - "dist/**"
  - "build/**"
  - "*.test.*"
  - "*.spec.*"
  - "package-lock.json"
  - "yarn.lock"
  - "scanner/**"
  - "reports/**"
  - "docs/**"

checks:

  - id: AU001
    severity: CRITICAL
    description: "Google service account JSON key file committed to repo"
    match:
      type: regex
      pattern: "\"type\":\\s*\"service_account\""
    reason: >
      A Google service account JSON key committed to the repo gives anyone
      (including AI agents scanning files) full API access to whatever IAM
      roles that service account holds â€” often project-wide.
    fix: >
      Revoke the key immediately in Google Cloud Console > IAM > Service Accounts.
      Remove from git history with: git filter-repo --invert-paths --path <file>
      Use Workload Identity Federation or Secret Manager instead of key files.

  - id: AU002
    severity: CRITICAL
    description: "GOOGLE_APPLICATION_CREDENTIALS points to a file path (key file used)"
    match:
      type: regex
      pattern: "GOOGLE_APPLICATION_CREDENTIALS\\s*[=:]\\s*[\"']?[./~][^\"'\\s]+"
      flags: "i"
    reason: >
      Setting GOOGLE_APPLICATION_CREDENTIALS to a file path means a service
      account key JSON exists on disk and the agent can read it via the env var.
      This is the pattern google-auth-library flags as high risk for container/CI envs.
    fix: >
      In GCP: use Workload Identity (no key file needed).
      In CI: inject credentials via Secret Manager or GitHub OIDC, not file path.
      Verify the key file is not committed: git ls-files | grep -i credentials

  - id: AU003
    severity: CRITICAL
    description: "OAuth2 client secret exposed in source"
    match:
      type: regex
      pattern: "\"client_secret\":\\s*\"GOCSPX-[a-zA-Z0-9_-]{28}\""
    reason: >
      Google OAuth2 client secrets exposed in source allow anyone to impersonate
      your application and initiate OAuth flows on its behalf.
    fix: >
      Rotate the client secret in Google Cloud Console > APIs & Services > Credentials.
      Load via environment variable: process.env.GOOGLE_CLIENT_SECRET

  - id: AU004
    severity: HIGH
    description: "Overly broad Google OAuth scope requested"
    match:
      type: regex
      pattern: "https://www\\.googleapis\\.com/auth/(cloud-platform|admin\\.directory|admin\\.reports|iam|compute)"
      flags: "i"
    reason: >
      Broad OAuth scopes like cloud-platform or admin.directory grant the agent
      access to resources far beyond what it needs.
      google-api-nodejs-client documentation emphasizes minimum-scope principle:
      request only the specific scopes each operation requires.
    fix: >
      Replace with the narrowest scope for the operation:
      cloud-platform â†’ storage.readonly or bigquery.readonly
      admin.directory â†’ admin.directory.users.readonly
      Audit all scopes in your OAuth consent screen.

  - id: AU005
    severity: HIGH
    description: "Service account key file referenced in GitHub Actions workflow"
    match:
      type: regex
      pattern: "google-github-actions/auth@"
      condition: not_accompanied_by
      not_accompanied_by: "workload_identity_provider"
      lines: 10
    reason: >
      Using google-github-actions/auth with credentials_json (a key file)
      instead of workload_identity_provider means a long-lived service account
      key is stored as a GitHub secret â€” rotatable but still a permanent credential.
    fix: >
      Migrate to Workload Identity Federation:
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/123/locations/global/workloadIdentityPools/...
        service_account: my-sa@my-project.iam.gserviceaccount.com

  - id: AU006
    severity: HIGH
    description: "gcloud auth activate-service-account with key file in CI script"
    match:
      type: regex
      pattern: "gcloud\\s+auth\\s+activate-service-account.*--key-file"
      flags: "i"
    reason: >
      Activating a service account with a key file in CI means the key file
      must exist on disk, making it accessible to any process in that job.
    fix: >
      Use Workload Identity Federation or Application Default Credentials
      instead of explicit key file activation.

  - id: AU007
    severity: HIGH
    description: "Firebase Admin SDK initialized with service account credential object inline"
    match:
      type: regex
      pattern: "admin\\.initializeApp\\s*\\(\\s*\\{[^}]*credential[^}]*serviceAccount"
      flags: "i"
    reason: >
      Inlining service account credentials in Firebase Admin initialization
      means the key data lives in source code and is scanned by AI agents.
    fix: >
      Use Application Default Credentials:
      admin.initializeApp({ credential: admin.credential.applicationDefault() })
      or load from environment: admin.credential.cert(JSON.parse(process.env.FIREBASE_SA))

  - id: AU008
    severity: MEDIUM
    description: "API key passed as query parameter in source code"
    match:
      type: regex
      pattern: "[?&]key=[A-Za-z0-9_-]{20,}"
    reason: >
      API keys in URL query strings appear in server logs, browser history,
      and Referer headers â€” making them effectively public.
      Google API documentation explicitly prohibits passing API keys as query params
      in production code.
    fix: >
      Pass the key via Authorization header or x-goog-api-key header.
      Never embed API keys in URLs that appear in logs or get shared.

  - id: AU009
    severity: MEDIUM
    description: "JWT signed with HS256 and hardcoded secret (symmetric key)"
    match:
      type: regex
      pattern: "sign\\s*\\([^,]+,\\s*[\"'][^\"'$\\{]{8,}[\"']"
      flags: "i"
    reason: >
      HS256 JWTs with hardcoded symmetric secrets mean every service that
      verifies the token also knows the signing key â€” any one of them can
      forge tokens. google-auth-library uses asymmetric RS256/ES256 for this reason.
    fix: >
      Use RS256 or ES256 with a proper key pair.
      Load the signing key from environment or secret manager, never hardcode.

  - id: AU010
    severity: MEDIUM
    description: "credentials.json or token.json file present in tracked paths"
    match:
      type: regex
      pattern: "(credentials|token|service.?account|gcp.?key|sa.?key)\\.json"
      flags: "i"
    reason: >
      Files with these names are the default output of gcloud, Google OAuth
      client libraries, and service account key downloads. They should never
      be committed.
    fix: >
      Add to .gitignore: credentials.json, token.json, *-sa-key.json
      Verify none are tracked: git ls-files | grep -iE "(credentials|token|sa-key)\.json"

  - id: AU011
    severity: LOW
    description: "TODO or FIXME referencing OAuth, token, or credentials"
    match:
      type: regex
      pattern: "(TODO|FIXME|HACK).*?(oauth|token|credential|service.?account|api.?key)"
      flags: "i"
    reason: >
      TODOs about credentials frequently indicate a temporary hardcoded value
      or a placeholder that was never properly replaced with a secure alternative.
    fix: >
      Resolve before merging. Do not defer credential security as a future task.
