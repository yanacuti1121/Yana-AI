<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>IO — YAMTAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

/* ── IO Nav ── */
.io-nav {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  z-index: 200; width: min(480px, calc(100% - 32px));
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.2rem; height: 46px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(40px) saturate(240%);
  -webkit-backdrop-filter: blur(40px) saturate(240%);
  border: 1px solid rgba(255,255,255,.55);
  border-radius: 24px;
  box-shadow: 0 6px 24px rgba(59,130,246,.1), inset 0 1px 0 rgba(255,255,255,.7);
}
.io-nav-logo {
  font-size: .82rem; font-weight: 700;
  color: hsl(220,75%,22%); text-decoration: none;
  letter-spacing: -.01em; white-space: nowrap;
}
.io-nav-links {
  display: flex; gap: 1rem; align-items: center;
}
.io-nav-links a {
  font-size: .75rem; font-weight: 500;
  color: rgba(30,58,138,.6); text-decoration: none;
  transition: color .15s;
}
.io-nav-links a:hover { color: hsl(220,75%,22%); }
.io-hamburger {
  display: none; flex-direction: column; gap: 4px;
  background: transparent; border: none; cursor: pointer; padding: .3rem;
}
.io-hamburger span {
  display: block; width: 18px; height: 2px;
  background: hsl(220,75%,28%); border-radius: 2px; transition: all .22s;
}
.io-hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.io-hamburger.open span:nth-child(2) { opacity: 0; }
.io-hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.io-drawer {
  display: none; position: fixed; top: 70px; left: 16px; right: 16px;
  z-index: 199; flex-direction: column; gap: .15rem;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(40px) saturate(220%);
  -webkit-backdrop-filter: blur(40px) saturate(220%);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 18px; padding: .75rem .5rem;
  box-shadow: 0 12px 40px rgba(59,130,246,.15);
}
.io-drawer.open { display: flex; }
.io-drawer a {
  color: hsl(220,70%,25%); text-decoration: none;
  font-size: .88rem; font-weight: 500;
  padding: .6rem .85rem; border-radius: 10px; transition: background .15s;
}
.io-drawer a:hover { background: rgba(59,130,246,.08); }

@media (max-width: 520px) {
  .io-nav-links { display: none; }
  .io-hamburger { display: flex; }
}

body {
  min-height: 100dvh;
  background: #dbeafe;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  overflow: hidden;
}

/* ── Desktop bg — blue sky ── */
.desktop-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, hsla(210,100%,82%,.9), transparent),
    radial-gradient(ellipse 60% 45% at 85% 75%, hsla(200,100%,78%,.7), transparent),
    radial-gradient(ellipse 55% 60% at 55% 5%,  hsla(220,100%,88%,.8), transparent),
    linear-gradient(165deg, #f0f9ff 0%, #dbeafe 40%, #bfdbfe 70%, #93c5fd 100%);
  overflow: hidden;
}
.desktop-bg::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 40% 55% at 75% 25%, rgba(255,255,255,.55), transparent),
    radial-gradient(ellipse 35% 40% at 20% 75%, rgba(255,255,255,.35), transparent);
}
.desktop-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='.5' fill='%233b82f6' fill-opacity='.07'/%3E%3C/svg%3E");
}

/* ── Phone frame — white liquid glass ── */
.phone {
  position: relative; z-index: 1;
  width: 375px; height: 812px;
  background: rgba(255,255,255,.22);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  border-radius: 52px;
  border: 1px solid rgba(255,255,255,.75);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.55) inset,
    0 0 0 8px rgba(255,255,255,.65),
    0 0 0 9.5px rgba(255,255,255,.45),
    0 0 0 10px rgba(59,130,246,.12),
    0 50px 120px rgba(59,130,246,.22),
    0 10px 40px rgba(147,197,253,.35);
  overflow: hidden;
  display: flex; flex-direction: column;
  transform-origin: center center;
  &::before {
    content: '';
    position: absolute; top: 5%; left: 0; width: 1.5px; height: 40%;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,.85), transparent);
    border-radius: 1px; z-index: 100; pointer-events: none;
  }
}

@media (max-height: 900px) { .phone { transform: scale(.88); } }
@media (max-height: 780px) { .phone { transform: scale(.76); } }
@media (max-width: 440px)  { .phone { transform: scale(.82); border-radius: 44px; } }

/* ── Wallpaper — blue-white sky ── */
.wallpaper {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 120% 55% at 50% 0%,  rgba(255,255,255,.95), transparent 48%),
    radial-gradient(ellipse 80% 55% at 5%  45%,  hsla(210,100%,82%,.7), transparent 55%),
    radial-gradient(ellipse 80% 55% at 95% 30%,  hsla(200,100%,78%,.6), transparent 55%),
    radial-gradient(ellipse 70% 50% at 50% 100%, hsla(220,100%,68%,.65), transparent 60%),
    radial-gradient(ellipse 55% 40% at 25% 65%,  hsla(195,100%,78%,.4), transparent),
    linear-gradient(180deg, #f0f9ff 0%, #dbeafe 28%, #bfdbfe 55%, #60a5fa 82%, #2563eb 100%);
  animation: wp-shift 22s ease-in-out infinite alternate;
}
@keyframes wp-shift {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  50%  { filter: hue-rotate(7deg) brightness(1.04); }
  100% { filter: hue-rotate(-4deg) brightness(.98); }
}

/* ── Status bar ── */
.status-bar {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px 0;
  height: 50px; flex-shrink: 0;
}
.status-time {
  font-size: .9rem; font-weight: 600;
  color: hsl(220, 75%, 22%);
  letter-spacing: -.01em;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.status-icons svg { fill: hsl(220, 75%, 22%); }

/* Dynamic Island */
.dynamic-island {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 30;
  background: rgba(8,18,38,.88);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-radius: 20px;
  overflow: hidden; cursor: pointer;
  width: 126px; height: 36px;
  transition: width .48s cubic-bezier(.16,1,.3,1),
              height .48s cubic-bezier(.16,1,.3,1),
              border-radius .48s cubic-bezier(.16,1,.3,1);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.12),
    0 4px 20px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.08);
}
.dynamic-island.expanded { width: 310px; height: 76px; border-radius: 28px; }

.di-default {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .2s;
}
.di-camera {
  width: 10px; height: 10px; border-radius: 50%;
  background: #0f172a; border: 1px solid rgba(255,255,255,.08);
}
.di-sensor {
  width: 6px; height: 6px; border-radius: 50%;
  background: #0c2a3a; box-shadow: 0 0 5px rgba(56,189,248,.6);
}
.dynamic-island.expanded .di-default { opacity: 0; pointer-events: none; }

.di-expanded {
  position: absolute; inset: 0;
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s .2s;
}
.dynamic-island.expanded .di-expanded { opacity: 1; pointer-events: auto; }

.di-av {
  width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
  background: rgba(255,255,255,.1); overflow: hidden;
  border: 1px solid rgba(255,255,255,.12);
}
.di-text { flex: 1; overflow: hidden; }
.di-title { font-size: .72rem; font-weight: 600; color: #fff; white-space: nowrap; }
.di-sub   { font-size: .62rem; color: rgba(255,255,255,.5); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.di-badge {
  width: 8px; height: 8px; border-radius: 50%;
  background: #34d058; box-shadow: 0 0 5px #34d058;
  flex-shrink: 0; transition: background .3s, box-shadow .3s;
}
.di-badge.thinking   { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: blink .7s ease-in-out infinite; }
.di-badge.responding { background: #60a5fa; box-shadow: 0 0 6px #60a5fa; }

/* ── Home screen ── */
.home-screen {
  position: relative; z-index: 5;
  flex: 1; display: flex; flex-direction: column;
  padding: 0 20px; overflow: hidden;
}

/* Date widget */
.date-widget {
  text-align: center;
  padding: 12px 0 20px; flex-shrink: 0;
}
.date-widget .day  { font-size: .78rem; color: rgba(30,58,138,.58); font-weight: 400; letter-spacing: .06em; text-transform: uppercase; }
.date-widget .date { font-size: 4.5rem; font-weight: 200; color: hsl(220,78%,18%); line-height: 1; letter-spacing: -.03em; margin-top: 2px; text-shadow: 0 2px 12px rgba(59,130,246,.18); }

/* App grid */
.app-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px 8px; flex: 1;
  align-content: start; padding-bottom: 8px;
}
.app-icon {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  cursor: pointer;
}
.app-icon:active .app-icon-img { transform: scale(.9); }

.app-icon-img {
  width: 64px; height: 64px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.75rem;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  position: relative; overflow: hidden;
  box-shadow:
    0 6px 20px rgba(59,130,246,.28),
    0 2px 6px rgba(0,0,0,.12),
    inset 0 1px 0 rgba(255,255,255,.45),
    inset 0 -1px 0 rgba(0,0,0,.08);
}
.app-icon-img::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.38) 0%, rgba(255,255,255,.06) 100%);
  border-radius: 18px 18px 50% 50% / 18px 18px 30px 30px;
  pointer-events: none; z-index: 1;
}
.app-icon-img::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.22) 0%, transparent 45%, rgba(0,0,0,.05) 100%);
  border-radius: 18px; pointer-events: none;
}
.app-icon-img:hover { transform: scale(1.08); box-shadow: 0 10px 28px rgba(59,130,246,.32), inset 0 1px 0 rgba(255,255,255,.55); }

.app-label {
  font-size: .62rem; color: hsl(220,68%,18%);
  font-weight: 600; text-align: center;
  text-shadow: 0 1px 4px rgba(255,255,255,.85);
  max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* App colors — blue family */
.app-chat     { background: linear-gradient(145deg, #1d4ed8, #3b82f6); }
.app-skills   { background: linear-gradient(145deg, #0369a1, #0ea5e9); }
.app-agents   { background: linear-gradient(145deg, #1e40af, #6366f1); }
.app-debug    { background: linear-gradient(145deg, #1e3a8a, #2563eb); }
.app-review   { background: linear-gradient(145deg, #075985, #0284c7); }
.app-commit   { background: linear-gradient(145deg, #164e63, #0891b2); }
.app-security { background: linear-gradient(145deg, #1e3a8a, #3730a3); }
.app-deploy   { background: linear-gradient(145deg, #0c4a6e, #38bdf8); }
.app-sprint   { background: linear-gradient(145deg, #1d4ed8, #818cf8); }
.app-docs     { background: linear-gradient(145deg, #1e40af, #60a5fa); }
.app-stats    { background: linear-gradient(145deg, #0f2a6e, #4f46e5); }
.app-settings { background: linear-gradient(145deg, #334155, #64748b); }
.app-test     { background: linear-gradient(145deg, #0369a1, #06b6d4); }
.app-refactor { background: linear-gradient(145deg, #1e3a8a, #7c3aed); }
.app-map      { background: linear-gradient(145deg, #0c4a6e, #0ea5e9); }
.app-pr       { background: linear-gradient(145deg, #1d4ed8, #93c5fd); }

/* ── Dock — white liquid glass ── */
.dock { position: relative; z-index: 5; flex-shrink: 0; padding: 10px 16px 0; }
.home-bar-wrap {
  position: relative; z-index: 5; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 8px 0 14px;
}
.back-link {
  font-size: .68rem; color: rgba(30,58,138,.48);
  text-decoration: none; font-weight: 500; letter-spacing: .01em;
  transition: color .15s;
}
.back-link:hover { color: rgba(30,58,138,.78); }
.home-indicator {
  width: 120px; height: 5px;
  background: rgba(59,130,246,.3); border-radius: 3px;
}
.dock-inner {
  background: rgba(255,255,255,.38);
  backdrop-filter: blur(52px) saturate(220%) brightness(1.08);
  -webkit-backdrop-filter: blur(52px) saturate(220%) brightness(1.08);
  border: 1px solid rgba(255,255,255,.72);
  border-top-color: rgba(255,255,255,.92);
  border-radius: 32px; padding: 12px 18px;
  display: flex; justify-content: space-around; align-items: center;
  box-shadow:
    0 8px 32px rgba(59,130,246,.18),
    0 2px 8px rgba(59,130,246,.08),
    inset 0 1px 0 rgba(255,255,255,.85),
    inset 0 -1px 0 rgba(59,130,246,.06);
  position: relative;
}
.dock-inner::before {
  content: '';
  position: absolute; inset: 0; border-radius: 32px;
  background: linear-gradient(180deg, rgba(255,255,255,.22) 0%, transparent 55%);
  pointer-events: none;
}

/* ── App window ── */
.app-window {
  position: absolute; z-index: 50; inset: 0;
  display: flex; flex-direction: column;
  transform: translateY(100%) scale(.96); opacity: 0;
  transition: transform .4s cubic-bezier(.32,0,.67,0), opacity .3s ease, border-radius .4s ease;
  border-radius: 52px; overflow: hidden;
}
.app-window.open {
  transform: translateY(0) scale(1); opacity: 1; border-radius: 52px;
  transition: transform .48s cubic-bezier(.16,1,.3,1), opacity .28s ease, border-radius .4s ease;
}

@keyframes app-close {
  0%   { transform: translateY(0) scale(1);      opacity: 1;  border-radius: 52px; }
  20%  { transform: translateY(0) scale(.93);    opacity: .9; border-radius: 40px; }
  100% { transform: translateY(105%) scale(.88); opacity: 0;  border-radius: 52px; }
}
.app-window.closing { animation: app-close .38s cubic-bezier(.4,0,.6,1) forwards; pointer-events: none; }

@keyframes app-switch-out {
  0%   { transform: translateX(0) scale(1);     opacity: 1; }
  100% { transform: translateX(-18%) scale(.88); opacity: 0; }
}
.app-window.switching-out { animation: app-switch-out .28s cubic-bezier(.4,0,.6,1) forwards; pointer-events: none; }

@keyframes app-switch-in {
  0%   { transform: translateX(30%) scale(.94); opacity: 0; }
  100% { transform: translateX(0) scale(1);     opacity: 1; }
}
.app-window.switching-in { animation: app-switch-in .38s cubic-bezier(.16,1,.3,1) forwards; pointer-events: none; }

@keyframes icon-catch {
  0%   { transform: scale(1); }
  40%  { transform: scale(.82); }
  70%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}
.app-icon-img.catching { animation: icon-catch .35s cubic-bezier(.34,1.56,.64,1) forwards; }

@keyframes icon-launch {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.18); }
  55%  { transform: scale(.94); }
  75%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}
.app-icon-img.launching { animation: icon-launch .4s cubic-bezier(.34,1.56,.64,1) forwards; }

@keyframes launch-burst {
  0%   { transform: scale(0); opacity: .4; }
  100% { transform: scale(3.5); opacity: 0; }
}
.launch-burst {
  position: absolute; border-radius: 18px;
  background: rgba(255,255,255,.32);
  pointer-events: none; z-index: 5;
  animation: launch-burst .4s ease-out forwards;
}

/* Floating home bar */
.home-float {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  z-index: 60; display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.home-float.visible { opacity: 1; pointer-events: auto; }
.home-float-pill {
  width: 120px; height: 5px;
  background: rgba(255,255,255,.55); border-radius: 3px;
  transition: background .15s, transform .12s;
}
.home-float:active .home-float-pill { background: rgba(255,255,255,.88); transform: scaleX(.92); }
.home-float-label { font-size: .55rem; color: rgba(255,255,255,.45); letter-spacing: .06em; text-transform: uppercase; font-weight: 500; }

.swipe-hint {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px; align-items: center;
  opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 59;
}
.swipe-hint.visible { opacity: 1; }
.swipe-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.28); transition: background .2s, transform .2s; }
.swipe-dot.active { background: rgba(255,255,255,.88); transform: scale(1.3); }

/* App window header — liquid glass */
.app-win-header {
  flex-shrink: 0; height: 56px;
  display: flex; align-items: center; padding: 0 20px;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.12);
}
.app-win-title { font-size: .92rem; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; }
.app-win-close {
  width: 30px; height: 30px;
  background: rgba(255,255,255,.14); border: none; border-radius: 50%; cursor: pointer;
  color: rgba(255,255,255,.8); font-size: .85rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.app-win-close:hover { background: rgba(255,255,255,.24); }
.app-win-body { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
.app-win-body::-webkit-scrollbar { display: none; }

/* ── Chat app — light blue ── */
.chat-bg { background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%); }
.chat-avatar-zone {
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0 12px;
  border-bottom: 1px solid rgba(59,130,246,.1);
}
.ai-logo {
  width: 90px; height: 90px; border-radius: 50%;
  background: rgba(255,255,255,.65);
  border: 1.5px solid rgba(59,130,246,.2); overflow: hidden;
  transition: box-shadow .3s, transform .3s;
}
.ai-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ai-logo.thinking  { animation: logo-pulse .8s ease-in-out infinite; box-shadow: 0 0 18px hsla(210,100%,60%,.38); }
.ai-logo.responding{ box-shadow: 0 0 14px hsla(221,90%,62%,.38); }

.cav-logo { width:100%; height:100%; object-fit:cover; display:block; border-radius:50%; }

@keyframes logo-pulse {
  0%,100% { transform: scale(1);    box-shadow: 0 0 14px hsla(210,100%,60%,.28); }
  50%     { transform: scale(1.06); box-shadow: 0 0 24px hsla(210,100%,60%,.58); }
}
.chat-ai-name { font-size: .8rem; font-weight: 600; color: hsl(220,70%,22%); margin-top: 8px; }
.chat-ai-status { font-size: .68rem; color: rgba(30,64,175,.48); margin-top: 2px; display:flex; align-items:center; gap:4px; }
.chat-dot { width:6px; height:6px; border-radius:50%; background:#34d058; box-shadow:0 0 5px #34d058; transition:background .3s,box-shadow .3s; }
.chat-dot.thinking { background:#fbbf24; box-shadow:0 0 6px #fbbf24; animation:blink .7s ease-in-out infinite; }

.chat-feed {
  flex: 1; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
  overflow-y: auto; scrollbar-width: none;
  max-height: 340px; min-height: 200px;
}
.chat-feed::-webkit-scrollbar { display: none; }

.cmsg { display:flex; gap:6px; align-items:flex-end; animation:msgIn .22s ease; }
.cmsg.user { flex-direction:row-reverse; }
.cav {
  width:24px; height:24px; border-radius:50%; flex-shrink:0;
  background:rgba(255,255,255,.55); border:1px solid rgba(59,130,246,.18); overflow:hidden;
}
.cbubble { max-width:72%; padding:.55rem .85rem; font-size:.8rem; line-height:1.55; border-radius:14px; word-break:break-word; }

.cmsg.ai .cbubble {
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(255,255,255,.72);
  border: 1px solid rgba(59,130,246,.12);
  border-top-color: rgba(255,255,255,.92);
  border-radius: 4px 16px 16px 16px;
  color: hsl(220,58%,18%);

/* ══ WATER DROP EFFECTS ══ */
.ripple-wrap { position:relative; overflow:hidden; }
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,.42);
  transform: scale(0);
  animation: ripple-expand .55s cubic-bezier(.4,0,.2,1) forwards;
  pointer-events: none; z-index: 99;
}
@keyframes ripple-expand {
  0%   { transform: scale(0); opacity: .6; }
  100% { transform: scale(4); opacity: 0; }
}

.water-drop {
  position: absolute; border-radius: 50%;
  pointer-events: none; z-index: 2;
  backdrop-filter: blur(4px) brightness(1.18);
  -webkit-backdrop-filter: blur(4px) brightness(1.18);
  border: 1px solid rgba(255,255,255,.62);
  background: radial-gradient(ellipse 40% 30% at 35% 30%,
    rgba(255,255,255,.72), rgba(255,255,255,.12) 60%, transparent);
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.82),
    inset -1px -1px 3px rgba(59,130,246,.08),
    0 2px 8px rgba(59,130,246,.12);
  animation: drop-float var(--dur,8s) ease-in-out var(--delay,0s) infinite;
}
@keyframes drop-float {
  0%,100% { transform: translate(0,0) scale(1); }
  25%     { transform: translate(var(--dx1,4px), var(--dy1,-6px)) scale(1.04); }
  50%     { transform: translate(var(--dx2,-3px), var(--dy2,4px)) scale(.97); }
  75%     { transform: translate(var(--dx3,5px), var(--dy3,-2px)) scale(1.02); }
}

.drip {
  position: absolute; top: 0; width: 3px;
  background: linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.0));
  border-radius: 0 0 50% 50%;
  pointer-events: none; z-index: 3;
  animation: drip-fall var(--ddur,3s) ease-in var(--ddelay,0s) infinite;
  transform-origin: top center;
}
@keyframes drip-fall {
  0%   { height: 0; opacity: 0; }
  10%  { height: 4px; opacity: .8; }
  60%  { height: 18px; opacity: .55; }
  90%  { height: 22px; opacity: 0; }
  100% { height: 0; opacity: 0; }
}
