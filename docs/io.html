<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IO — YAMTAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:          hsl(222, 84%, 5%);
  --bg-subtle:   hsl(222, 47%, 8%);
  --bg-card:     hsl(222, 40%, 10%);
  --border:      hsl(217, 33%, 17%);
  --border-strong: hsl(217, 33%, 24%);
  --fg:          hsl(210, 40%, 96%);
  --fg-muted:    hsl(215, 20%, 55%);
  --accent:      hsl(221, 83%, 60%);
  --accent-glow: hsla(221, 83%, 60%, .25);
  --user-bg:     hsl(221, 60%, 16%);
  --ai-bg:       hsl(222, 40%, 12%);
  --font:        'Inter', system-ui, sans-serif;
  --mono:        'JetBrains Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

/* ── Layout ── */
.shell {
  display: grid;
  grid-template-rows: 56px 1fr 72px;
  height: 100dvh;
  max-width: 820px;
  margin: 0 auto;
  padding: 0 1rem;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}
.header-left {
  display: flex;
  align-items: center;
  gap: .65rem;
}
.avatar-wrap {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  overflow: hidden;
  border: 1.5px solid var(--border-strong);
  background: hsl(222, 40%, 7%);
  flex-shrink: 0;
  cursor: pointer;
  transition: border-color .2s;
}
.avatar-wrap:hover { border-color: var(--accent); }
#avatar-lottie { width: 100%; height: 100%; transform: scale(1.4); }
.header-name {
  font-weight: 600;
  font-size: .9rem;
  letter-spacing: -.01em;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: hsl(142, 71%, 45%);
  box-shadow: 0 0 6px hsl(142, 71%, 45%);
  transition: background .3s, box-shadow .3s;
  flex-shrink: 0;
}
.status-dot.thinking {
  background: #fbbf24;
  box-shadow: 0 0 8px #fbbf24;
  animation: pulse-dot .8s ease-in-out infinite;
}
.status-label {
  font-size: .75rem;
  color: var(--fg-muted);
  font-family: var(--mono);
  min-width: 70px;
}
.header-right a {
  color: var(--fg-muted);
  text-decoration: none;
  font-size: .8rem;
  transition: color .15s;
}
.header-right a:hover { color: var(--fg); }

/* ── Messages ── */
.messages {
  overflow-y: auto;
  padding: 1.5rem 0;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.msg {
  display: flex;
  gap: .75rem;
  max-width: 100%;
  animation: fadeUp .2s ease;
}
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .7rem;
  font-weight: 700;
  margin-top: 2px;
}
.msg.ai .msg-avatar {
  background: hsl(222, 40%, 7%);
  border: 1px solid var(--border-strong);
  overflow: hidden;
}
#msg-avatar-lottie { width: 100%; height: 100%; transform: scale(1.35); }
.msg.user .msg-avatar {
  background: var(--accent);
  color: #fff;
  font-size: .65rem;
}

.bubble {
  padding: .65rem 1rem;
  border-radius: 14px;
  max-width: 78%;
  font-size: .9rem;
  line-height: 1.65;
  word-break: break-word;
}
.msg.ai .bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
}
.msg.user .bubble {
  background: var(--user-bg);
  border: 1px solid hsl(221,50%,25%);
  border-radius: 14px 4px 14px 14px;
  color: hsl(210,60%,92%);
}

/* thinking bubble */
.thinking-bubble {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: .75rem 1rem;
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
}
.thinking-bubble span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--fg-muted);
  animation: bounce .9s ease-in-out infinite;
}
.thinking-bubble span:nth-child(2) { animation-delay: .15s; }
.thinking-bubble span:nth-child(3) { animation-delay: .3s; }

/* code inline */
code {
  font-family: var(--mono);
  font-size: .82em;
  background: hsl(222, 40%, 7%);
  padding: .1em .35em;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: #93c5fd;
}

/* ── Input bar ── */
.inputbar {
  display: flex;
  align-items: center;
  gap: .65rem;
  border-top: 1px solid var(--border);
  padding: .75rem 0;
}
#user-input {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  padding: .6rem 1rem;
  color: var(--fg);
  font-family: var(--font);
  font-size: .9rem;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  resize: none;
  height: 42px;
  line-height: 1.5;
}
#user-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
#user-input::placeholder { color: var(--fg-muted); }
#send-btn {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, box-shadow .15s;
  box-shadow: 0 2px 12px var(--accent-glow);
}
#send-btn:hover { opacity: .85; box-shadow: 0 4px 18px var(--accent-glow); }
#send-btn:disabled { opacity: .4; cursor: not-allowed; }
#send-btn svg { width: 18px; height: 18px; fill: #fff; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); }
  40%           { transform: translateY(-5px); }
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="avatar-wrap" id="header-avatar" title="Click to expand">
        <div id="avatar-lottie"></div>
      </div>
      <div>
        <div class="header-name">YAMTAM IO</div>
        <div style="display:flex;align-items:center;gap:.4rem;margin-top:1px">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-label" id="status-label">ready</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <a href="index.html">← back</a>
    </div>
  </header>

  <!-- Messages -->
  <main class="messages" id="messages">
    <div class="msg ai" id="welcome-msg">
      <div class="msg-avatar">
        <div id="msg-avatar-lottie"></div>
      </div>
      <div class="bubble">
        Xin chào. Tôi là <code>YAMTAM IO</code>.<br>
        Bạn muốn làm gì hôm nay?
      </div>
    </div>
  </main>

  <!-- Input -->
  <div class="inputbar">
    <textarea id="user-input" placeholder="Nhắn gì đó…" rows="1"></textarea>
    <button id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
// ── Lottie instances ──
const headerAnim = lottie.loadAnimation({
  container: document.getElementById('avatar-lottie'),
  renderer: 'svg',
  loop: true,
  autoplay: false,
  path: 'chatgpt-atlas-animation.json'
});

const msgAnim = lottie.loadAnimation({
  container: document.getElementById('msg-avatar-lottie'),
  renderer: 'svg',
  loop: true,
  autoplay: false,
  path: 'chatgpt-atlas-animation.json'
});

// ── State machine ──
// idle | thinking | responding
let state = 'idle';

function setState(s) {
  state = s;
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');

  if (s === 'idle') {
    headerAnim.stop();
    msgAnim.stop();
    dot.className = 'status-dot';
    label.textContent = 'ready';
  } else if (s === 'thinking') {
    headerAnim.setSpeed(1.6);
    headerAnim.play();
    msgAnim.setSpeed(1.6);
    msgAnim.play();
    dot.className = 'status-dot thinking';
    label.textContent = 'thinking…';
  } else if (s === 'responding') {
    headerAnim.setSpeed(1);
    headerAnim.play();
    msgAnim.setSpeed(1);
    msgAnim.play();
    dot.className = 'status-dot';
    dot.style.background = 'var(--accent)';
    dot.style.boxShadow = '0 0 6px var(--accent)';
    label.textContent = 'responding';
  }
}

// ── Demo responses ──
const demos = [
  'Tôi có thể giúp bạn viết code, debug, review PR, hoặc lên kế hoạch cho feature mới.',
  'Bạn có thể dùng <code>/debug</code>, <code>/code-review</code>, hoặc <code>/quick-commit</code> để bắt đầu.',
  'YAMTAM Engine hiện có <code>3,437</code> skills và <code>93</code> agents sẵn sàng.',
  'Tôi đang chạy trên <code>claude-sonnet-4-6</code>. Bạn muốn làm gì?',
  'Hãy thử hỏi tôi về bất kỳ task nào — tôi sẽ route đúng agent.',
];
let demoIdx = 0;

// ── Message helpers ──
function addMessage(role, html) {
  const feed = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  if (role === 'ai') {
    msg.innerHTML = `
      <div class="msg-avatar"><div id="msg-avatar-lottie-${Date.now()}"></div></div>
      <div class="bubble">${html}</div>`;
    feed.appendChild(msg);
    // mini lottie in message avatar
    lottie.loadAnimation({
      container: msg.querySelector('[id^=msg-avatar-lottie-]'),
      renderer: 'svg', loop: true, autoplay: false,
      path: 'chatgpt-atlas-animation.json'
    });
  } else {
    msg.innerHTML = `
      <div class="bubble">${html}</div>
      <div class="msg-avatar" style="background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0">You</div>`;
    feed.appendChild(msg);
  }
  feed.scrollTop = feed.scrollHeight;
  return msg;
}

function addThinking() {
  const feed = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = 'thinking-indicator';
  msg.innerHTML = `
    <div class="msg-avatar" style="width:30px;height:30px;border-radius:50%;background:hsl(222,40%,7%);border:1px solid var(--border-strong);overflow:hidden;margin-top:2px;flex-shrink:0">
      <div id="think-lottie" style="width:100%;height:100%;transform:scale(1.35)"></div>
    </div>
    <div class="thinking-bubble"><span></span><span></span><span></span></div>`;
  feed.appendChild(msg);
  feed.scrollTop = feed.scrollHeight;
  lottie.loadAnimation({
    container: document.getElementById('think-lottie'),
    renderer: 'svg', loop: true, autoplay: true,
    path: 'chatgpt-atlas-animation.json'
  });
  return msg;
}

// ── Send logic ──
async function send() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text || state !== 'idle') return;

  input.value = '';
  input.style.height = '42px';
  btn.disabled = true;

  addMessage('user', escapeHtml(text));
  setState('thinking');
  const thinkEl = addThinking();

  // Simulate thinking delay 1.2–2s
  await sleep(1200 + Math.random() * 800);

  thinkEl.remove();
  setState('responding');

  const response = demos[demoIdx % demos.length];
  demoIdx++;

  await typeMessage(response);

  setState('idle');
  btn.disabled = false;
  input.focus();
}

async function typeMessage(html) {
  const feed = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = 'msg ai';
  const avatarId = `msg-av-${Date.now()}`;
  msg.innerHTML = `
    <div class="msg-avatar" style="width:30px;height:30px;border-radius:50%;background:hsl(222,40%,7%);border:1px solid var(--border-strong);overflow:hidden;margin-top:2px;flex-shrink:0">
      <div id="${avatarId}" style="width:100%;height:100%;transform:scale(1.35)"></div>
    </div>
    <div class="bubble" id="typing-bubble"></div>`;
  feed.appendChild(msg);
  feed.scrollTop = feed.scrollHeight;

  const av = lottie.loadAnimation({
    container: document.getElementById(avatarId),
    renderer: 'svg', loop: true, autoplay: true,
    path: 'chatgpt-atlas-animation.json'
  });

  // Strip HTML tags for char-by-char, then set full HTML at end
  const plain = html.replace(/<[^>]+>/g, '');
  const bubble = document.getElementById('typing-bubble');
  for (let i = 0; i <= plain.length; i++) {
    bubble.textContent = plain.slice(0, i);
    feed.scrollTop = feed.scrollHeight;
    await sleep(18);
  }
  bubble.innerHTML = html;
  av.stop();
}

// ── Utils ──
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Events ──
document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
