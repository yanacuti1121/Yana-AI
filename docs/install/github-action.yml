# Copy this file to .github/workflows/yana-ai-scan.yml in YOUR repo
# Full docs: https://yanacuti1121.github.io/yana-ai/

name: Yana AI Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write          # needed to post PR comments
  security-events: write        # needed for SARIF upload to Code Scanning

jobs:
  yana-ai-scan:
    name: Agent Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: yanacuti1121/yana-ai/.github/actions/scan@main
        with:
          target: '.'
          fail-on: 'high'          # fail CI on HIGH or CRITICAL findings
          diff-only: 'true'        # on PRs: scan only changed files
          sarif: 'true'            # upload to GitHub Code Scanning
          comment-on-pr: 'true'    # post summary comment on PRs
