id: TA003
name: TEST-TAMPER
severity: HIGH            # only when an assertion is removed/weakened
description: >
  Session claims a fix while MODIFYING existing test files. Creating brand-new
  test files does NOT fire (that's adding protection). Removing/weakening an
  assertion fires HIGH; other modifications to existing tests fire MED for
  human review. Calibrated 2026-07-04 against 7 real sessions (TA003 FP on
  "added 8 new tests" case).
params:
  modified_severity: MED
  fixed_claim_patterns:
    - '\b(fixed|resolved|đã\s+sửa|đã\s+fix)\b'
    - '(all\s+)?tests?\s+(are\s+)?(now\s+)?pass(ing|ed)?'
  assertion_patterns:
    - '\b(assert|expect\s*\(|should\.|EXPECT_|ASSERT_|assert_eq!|assert!|\.toBe|\.toEqual|XCTAssert)'
