<html lang="en">
<head>
  <meta charset="UTF-8">

<meta property="og:description" content="Search 3,457 skills, 95 agents, commands and rules in Yana AI.">

<meta name="description" content="Search 3,457 skills, 95 agents, commands and rules in Yana AI.">
  <style>
    :root {
      --bg:#fafaf9;--bg2:#f2f0ec;--border:#ddd9d0;
      --text:#1a1714;--muted:#6b6560;--accent:hsl(155,52%,32%);--green:#16a34a;--blue:#2563eb;
    }
    .dark {
      --bg:#0f0e0d;--bg2:#1a1917;--border:#2e2c28;
      --text:#e8e2d9;--muted:#8a8070;--accent:hsl(155,52%,42%);--green:#4ade80;--blue:#60a5fa;
    }
    html.theme-trans * { transition: background-color .25s ease, color .2s ease, border-color .2s ease !important; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,sans-serif;min-height:100vh}
    .nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg)}
    .nav-logo{font-weight:800;font-size:1.1rem;text-decoration:none;color:var(--text)}
    .nav-logo span{color:var(--accent)}
    .nav-links{display:flex;gap:1.5rem;font-size:.9rem}
    .nav-links a{color:var(--muted);text-decoration:none}.nav-links a:hover{color:var(--text)}
    main{max-width:900px;margin:0 auto;padding:3rem 2rem}
    h1{font-size:2rem;font-weight:700;margin-bottom:.5rem}
    .subtitle{color:var(--muted);margin-bottom:2rem;font-size:.95rem}
    .search-wrap{position:relative;margin-bottom:1.5rem}
    #q{width:100%;padding:.875rem 1.25rem .875rem 3rem;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:1rem;outline:none;transition:border-color .15s}
    #q:focus{border-color:var(--accent)}
    .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1.1rem}
    .filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
    .filter-btn{padding:.35rem .85rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .15s}
    .filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#000}
    .stats{color:var(--muted);font-size:.85rem;margin-bottom:1rem}
    .results{display:grid;gap:.5rem}
    .item{padding:.875rem 1.25rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s;text-decoration:none;display:block}
    .item:hover{border-color:var(--accent)}
    .item-top{display:flex;align-items:center;gap:.75rem;margin-bottom:.3rem}
    .item-name{font-weight:600;font-size:.95rem;color:var(--text)}
    .badge{padding:.15rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600}
    .badge-skill{background:#1a3a2a;color:var(--green)}
    .badge-agent{background:#1a2a3a;color:var(--blue)}
    .badge-command{background:#2a2a1a;color:#fbbf24}
    .badge-rule{background:#2a1a1a;color:#f87171}
    .item-desc{color:var(--muted);font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .empty{text-align:center;color:var(--muted);padding:4rem 0}
    .empty span{font-size:3rem;display:block;margin-bottom:1rem}
    .empty p{font-size:.9rem;margin-top:.5rem;opacity:.6}
    .highlight{background:hsla(155,52%,42%,.22);color:hsl(155,52%,62%);border-radius:2px;padding:0 1px}
    .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,#252320 50%,var(--bg2) 75%);background-size:200% 100%;animation:sk-shimmer 1.4s infinite;border-radius:10px;height:64px;border:1px solid var(--border)}
    @keyframes sk-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .more-btn{display:block;width:100%;padding:.75rem;margin-top:.75rem;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .15s}
    .more-btn:hover{border-color:var(--accent);color:var(--accent)}
    footer{text-align:center;color:var(--muted);font-size:.85rem;padding:3rem 0 2rem}
  @media(max-width:768px){.nav-links{display:none}.hbg{display:flex!important}}
  .hbg{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;border:none;background:transparent;padding:4px;border-radius:6px;flex-shrink:0}
  .hbg span{display:block;height:2px;width:22px;background:var(--text);border-radius:2px;transition:.25s}
  .hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
  .hbg.open span:nth-child(2){opacity:0;transform:scaleX(0)}
  .hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
  .mob-drawer{display:none;position:fixed;inset:0;top:72px;background:rgba(250,248,245,.97);backdrop-filter:blur(20px);z-index:99;padding:1.5rem 2rem;flex-direction:column;gap:.75rem;border-top:1px solid var(--border)}
  .dark .mob-drawer{background:rgba(18,16,13,.97)}
  .mob-drawer.open{display:flex}
  .mob-drawer a{color:var(--text);text-decoration:none;font-size:1rem;font-weight:500;padding:.5rem .75rem;border-radius:8px}
  .mob-drawer a:hover{background:var(--bg2)}
  @keyframes _pg{from{opacity:0}to{opacity:1}}body{animation:_pg .32s ease-out both}
</style>

</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="./"><span>⚡</span> Yana AI</a>
  <div class="nav-links">
    <a href="./">Home</a>
    <a href="https://github.com/yanacuti1121/yana-ai" target="_blank">GitHub</a>
    <button id="theme-toggle" onclick="toggleTheme()" style="border:none;background:transparent;cursor:pointer;font-size:1rem;padding:.25rem .4rem;border-radius:6px;line-height:1">🌙</button>
  </div>
  <button class="hbg" id="hbg" onclick="toggleHbg()" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>
<div class="mob-drawer" id="mob-drawer">
  <a href="./" onclick="toggleHbg()">Home</a>
  <a href="https://github.com/yanacuti1121/yana-ai" target="_blank" onclick="toggleHbg()">GitHub</a>
</div>

<main>
  <h1 data-i18n="page.h1">Search</h1>
  <p class="subtitle" id="subtitle">Loading index…</p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="q" type="search" placeholder="Search skills, agents, commands, rules…" data-i18n-placeholder="search.ph" autofocus autocomplete="off">
  </div>

  <div class="filters">
    <button class="filter-btn active" data-type="all" data-i18n="filter.all">All</button>
    <button class="filter-btn" data-type="skill" data-i18n="filter.skill">Skills</button>
    <button class="filter-btn" data-type="agent" data-i18n="filter.agent">Agents</button>
    <button class="filter-btn" data-type="command" data-i18n="filter.command">Commands</button>
    <button class="filter-btn" data-type="rule" data-i18n="filter.rule">Rules</button>
  </div>

  <p class="stats" id="stats"></p>
  <div class="results" id="results"></div>
</main>

<footer>Yana AI · <a href="https://github.com/yanacuti1121/yana-ai" style="color:var(--muted)">GitHub</a></footer>

<script>
let INDEX = [];
let activeType = 'all';
let _shown = 60;
let _debounce;

function esc(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function hi(text, q) {
  if (!q) return esc(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return esc(text);
  return esc(text.slice(0, idx)) + `<mark class="highlight">${esc(text.slice(idx, idx+q.length))}</mark>` + esc(text.slice(idx+q.length));
}

function showSkeleton() {
  document.getElementById('results').innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');
}

async function loadData() {
  showSkeleton();
  const [skills, agents, commands, rules] = await Promise.all([
    fetch('skills-data.json').then(r=>r.json()).catch(()=>[]),
    fetch('agents-data.json').then(r=>r.json()).catch(()=>[]),
    fetch('commands-data.json').then(r=>r.json()).catch(()=>[]),
    fetch('rules-data.json').then(r=>r.json()).catch(()=>[]),
  ]);
  INDEX = [
    ...skills.map(s=>({type:'skill',   id:s.id||s.name, name:s.name||s.id, desc:s.desc||''})),
    ...agents.map(a=>({type:'agent',   id:a.id||a.name, name:a.name||a.id, desc:a.desc||a.description||''})),
    ...commands.map(c=>({type:'command',id:c.name||c.id, name:c.name||c.id, desc:c.description||c.desc||''})),
    ...rules.map(r=>({type:'rule',     id:r.name||r.id, name:r.name||r.id, desc:r.description||r.desc||''})),
  ];
  document.getElementById('subtitle').textContent =
    `${skills.length.toLocaleString()} skills · ${agents.length} agents · ${commands.length} commands · ${rules.length} rules`;
  render('');
}

function search(q, type) {
  const ql = q.toLowerCase().trim();
  return INDEX.filter(item => {
    if (type !== 'all' && item.type !== type) return false;
    if (!ql) return true;
    return item.name.toLowerCase().includes(ql) || item.desc.toLowerCase().includes(ql);
  });
}

function badgeClass(type) {
  return {skill:'badge-skill', agent:'badge-agent', command:'badge-command', rule:'badge-rule'}[type] || '';
}

function render(q, reset=true) {
  if (reset) _shown = 60;
  const results = search(q, activeType);
  const shown = results.slice(0, _shown);
  const stats = document.getElementById('stats');
  const container = document.getElementById('results');

  stats.textContent = (q || activeType !== 'all') ? `${results.length.toLocaleString()} kết quả` : '';

  if (!shown.length) {
    container.innerHTML = `<div class="empty"><span>🔍</span><p>Không tìm thấy kết quả cho "<strong>${esc(q)}</strong>"</p></div>`;
    return;
  }

  container.innerHTML = shown.map(item => `
    <div class="item">
      <div class="item-top">
        <span class="item-name">${hi(item.name, q)}</span>
        <span class="badge ${badgeClass(item.type)}">${item.type}</span>
      </div>
      <div class="item-desc">${hi(item.desc||'—', q)}</div>
    </div>
  `).join('');

  if (results.length > _shown) {
    container.innerHTML += `<button class="more-btn" onclick="loadMore()">Xem thêm ${Math.min(60, results.length-_shown)} kết quả…</button>`;
  }
}

function loadMore() {
  _shown += 60;
  render(document.getElementById('q').value, false);
}

document.getElementById('q').addEventListener('input', e => {
  clearTimeout(_debounce);
  _debounce = setTimeout(() => render(e.target.value), 150);
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    render(document.getElementById('q').value);
  });
});

loadData();
</script>
  <script src="water-bg.js" defer></script>
  <script src="water-droplet.js" defer></script>
  <script src="lotus-petals.js" defer></script>
  <!-- Music player -->
  <div id="yt-player" style="position:fixed;width:0;height:0;opacity:0;pointer-events:none"></div>
  <button id="mute-btn" onclick="toggleMute()" title="Phát nhạc" style="
    position:fixed;bottom:1.2rem;right:1.2rem;z-index:9999;
    background:rgba(255,255,255,.12);backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.2);border-radius:50%;
    width:2.4rem;height:2.4rem;font-size:1rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .2s;
  ">▶</button>
  <a href="music.html" title="Chọn nhạc" style="
    position:fixed;bottom:1.2rem;right:4.2rem;z-index:9999;
    background:rgba(255,255,255,.10);backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.18);border-radius:50%;
    width:2.4rem;height:2.4rem;font-size:.9rem;text-decoration:none;
    display:flex;align-items:center;justify-content:center;transition:all .2s;
  ">🎵</a>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="music-player.js"></script>
  <script src="shared-theme.js"></script>
  <script src="i18n.js"></script>
  <script>function toggleHbg(){var h=document.getElementById('hbg'),d=document.getElementById('mob-drawer');h.classList.toggle('open');d.classList.toggle('open');document.body.style.overflow=d.classList.contains('open')?'hidden':'';}
</script>
</body>
</html>
