name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Hook Tests (826 checks)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-pip
          python3 -m pip install -r requirements-dev.txt

      # guard-blast-radius.sh's 4 test cases in run-hook-tests.sh are
      # Rust-only (no bash fallback — see the hook's own header comment)
      # and SKIP silently without a built target/release/yana-rt. That
      # meant this guard had never actually run in CI, on any commit,
      # ever — which is exactly how a real absolute-path bypass regression
      # in src/guard/blast_paths.rs went undetected until it was caught by
      # chance during a manual local run (see the 2026-07-03 fix commit).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (node24)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build yana-rt (release, for guard-blast-radius.sh)
        run: cargo build --release --bin yana-rt

      - name: Run hook test suite
        run: bash core/tests/hooks/run-hook-tests.sh

      - name: Drift check
        run: bash core/scripts/drift-check.sh

      - name: Check for dangling paths (package.json cd targets, files[], within-axis versions)
        run: python3 core/scripts/check_dangling_paths.py

      - name: Check guards/index.yml drift
        run: python3 core/scripts/gen_guards_index.py --check

      - name: Verify install script is executable
        run: bash -n install.sh

      - name: Check compiled scanner rule drift
        run: python3 core/scripts/compile_scanner_rules.py --check

      - name: Validate Harness Scaling schema examples
        run: python3 tests/test_harness_schema_examples.py

      - name: Validate .yana-aiignore regression behavior
        run: python3 tests/test_yanaignore.py

      - name: Validate spec command regression behavior
        run: python3 tests/test_validate_spec.py

      - name: Validate context-pack checker regression behavior
        run: python3 tests/test_context_pack_check.py

      - name: Validate validator JSON schema contract
        run: python3 tests/test_validator_json_schema.py

      - name: Validate audit JSON MVP regression behavior
        run: python3 -m pytest tests/test_audit_json_mvp.py -q

  rust-tests:
    name: Rust Integration Tests (yana-rt)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (node24)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build yana-rt
        run: cargo build --bin yana-rt

      - name: Check main.rs / bin/yana dispatch drift
        run: ./target/debug/yana-rt doctor dispatch . --json

      # ADR-008: `cargo test --test integration_runtime` (below) only runs
      # that one named integration binary — it does NOT pick up
      # `#[cfg(test)] mod tests` blocks inside src/*.rs (e.g.
      # src/guard/lock.rs's own unit tests), which is a bare `cargo test`
      # invocation this repo didn't have until now. --test-threads=1
      # because guard::blast_paths' existing tests have a known $PWD race
      # under parallel execution (see that module's own test comments) —
      # unrelated to this addition, but this step would otherwise
      # intermittently fail on it.
      - name: Run unit tests
        run: cargo test --bin yana-rt -- --test-threads=1

      - name: Run integration tests
        run: cargo test --test integration_runtime -- --test-threads=4

  self-audit:
    name: Yana AI Self-Audit (dogfooding — scanner/*.yml on this repo)
    # .github/workflows/yana-audit.yml is a copy-paste EXAMPLE for other
    # repos (its own header says so, and it explicitly skips itself here:
    # `if: github.repository != 'yanacuti1121/yana-ai'`) — this job is the
    # real thing: the tool that audits other people's agent setups,
    # actually run against its own source, built fresh from this commit
    # rather than a possibly-stale `cargo install`'d release.
    # docs/Yana-AI-Danh-gia-Kien-truc-Bao-mat.md section 3.5 #31.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # required for SARIF upload to GitHub Code Scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)
        with:
          fetch-depth: 0   # needed for --diff origin/<base> on pull_request

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (node24)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build yana-rt (release)
        run: cargo build --release --bin yana-rt

      - name: Run self-audit
        run: |
          # On PRs: only the files changed in this PR — a ratchet that
          # blocks new debt without failing on whatever of this repo's
          # existing medium/low findings haven't been cleaned up yet. On
          # push to main: full-repo scan, since there's no "base" diff for
          # a direct push. AU010/CI008 ignored for the same documented
          # reason .github/workflows/yana-audit.yml's own template already
          # ignores them: known-noisy heuristics on a repo that legitimately
          # documents these exact patterns and legitimately publishes
          # packages.
          DIFF_FLAG=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF_FLAG="--diff origin/${{ github.base_ref }}"
          fi
          ./target/release/yana-rt scan . \
            $DIFF_FLAG \
            --fail-on high \
            --ignore AU010 \
            --ignore CI008 \
            --sarif yana-ai-self-audit.sarif \
            --markdown yana-ai-self-audit-report.md

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: yana-ai-self-audit.sarif
          category: yana-ai-self-audit

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 (node24)
        with:
          name: yana-ai-self-audit-report
          path: |
            yana-ai-self-audit-report.md
            yana-ai-self-audit.sarif
          retention-days: 30
