name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Hook Tests (826 checks)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-pip
          python3 -m pip install -r requirements-dev.txt

      - name: Run hook test suite
        run: bash core/tests/hooks/run-hook-tests.sh

      - name: Drift check
        run: bash core/scripts/drift-check.sh

      - name: Verify install script is executable
        run: bash -n install.sh

      - name: Check compiled scanner rule drift
        run: python3 core/scripts/compile_scanner_rules.py --check

      - name: Validate Harness Scaling schema examples
        run: python3 tests/test_harness_schema_examples.py

      - name: Validate .yana-aiignore regression behavior
        run: python3 tests/test_yanaignore.py

      - name: Validate spec command regression behavior
        run: python3 tests/test_validate_spec.py

      - name: Validate context-pack checker regression behavior
        run: python3 tests/test_context_pack_check.py

      - name: Validate validator JSON schema contract
        run: python3 tests/test_validator_json_schema.py

      - name: Validate audit JSON MVP regression behavior
        run: python3 -m pytest tests/test_audit_json_mvp.py -q

  rust-tests:
    name: Rust Integration Tests (yana-rt)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (node24)
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build yana-rt
        run: cargo build --bin yana-rt

      - name: Run integration tests
        run: cargo test --test integration_runtime -- --test-threads=4
