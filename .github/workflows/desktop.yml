name: Desktop Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: "*.AppImage"
          - os: macos-latest
            platform: mac
            artifact: "*.dmg"
          - os: windows-latest
            platform: win
            artifact: "*.exe"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: '20'

      - name: Generate 512×512 icon from SVG (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y imagemagick
          convert -background none tools/yana-desktop/build/icon.svg \
            -resize 512x512 tools/yana-desktop/build/icon.png

      - name: Generate 512×512 icon from SVG (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install imagemagick
          magick -background none tools/yana-desktop/build/icon.svg \
            -resize 512x512 tools/yana-desktop/build/icon.png

      - name: Install yana-desktop dependencies
        working-directory: tools/yana-desktop
        run: npm install

      - name: Build app
        working-directory: tools/yana-desktop
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1
        with:
          name: yana-desktop-${{ matrix.platform }}
          path: tools/yana-desktop/dist/${{ matrix.artifact }}
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: tools/yana-desktop/dist/${{ matrix.artifact }}
          fail_on_unmatched_files: false
