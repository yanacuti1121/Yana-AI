name: Publish to npm + PyPI

on:
  release:
    types: [published]

jobs:
  publish-pypi:
    name: PyPI — yamtam-engine
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/yamtam-engine/
    permissions:
      id-token: write   # OIDC trusted publishing (no token needed)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: npm — yamtam-engine
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/yamtam-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"       # e.g. v0.15.0
          VERSION="${TAG#v}"                  # strip leading v
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
