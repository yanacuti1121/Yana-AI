name: Publish to npm + PyPI + crates.io

# Three independent version axes (see VERSIONING.md): product (npm,
# package.json/MANIFEST.json), yana-rt crate (crates.io, Cargo.toml), and
# the Python package (PyPI, pyproject.toml). Each axis has its own tag
# prefix so pushing one axis's tag never touches the other two files.
# Before 2026-07-05 all three jobs ran unconditionally on any
# `v[0-9]+.[0-9]+.[0-9]+` tag and each force-set its own version file to
# that same tag number, silently collapsing the three axes into one and
# contradicting VERSIONING.md's own stated design.
#
# Reviewed 2026-07-05 (security-auditor + code-auditor per
# 54-bft-consensus-law.md) before this version landed. Two things the
# first draft of this fix got wrong, now fixed:
# 1. `github.ref_name` is populated on every trigger, including
#    workflow_dispatch (it reflects whichever ref was picked to run the
#    workflow from), so a ref_name-based condition with no event_name
#    guard could fire alongside a workflow_dispatch run that selected a
#    different target, publishing two registries at once. Every
#    ref_name/tag_name clause below is now scoped to its own event type.
# 2. The "Set version from tag" step interpolated the tag name directly
#    into `${{ }}` inside the shell script. Git tag names can contain
#    `$()`/backticks (not blocked by git's ref-name rules), so a
#    maliciously named tag driving a `release: published` event could
#    inject shell commands into a job holding publish secrets. Fixed by
#    passing the raw value through `env:` and referencing it as a quoted
#    shell variable instead, so its contents are never re-parsed as
#    script text.
on:
    push:
      tags:
        - 'v[0-9]+.[0-9]+.[0-9]+'      # product version -> npm only
        - 'rt-v[0-9]+.[0-9]+.[0-9]+'   # yana-rt crate version -> crates.io only
        - 'py-v[0-9]+.[0-9]+.[0-9]+'   # Python package version -> PyPI only
    release:
      types: [published]
    workflow_dispatch:
      inputs:
        version:
          description: 'Version to publish (e.g. 0.42.1)'
          required: true
          default: '0.42.1'
        target:
          description: 'Which registry to publish'
          required: true
          type: choice
          options: [npm, pypi, crates]
          default: 'npm'

jobs:
  publish-pypi:
    name: PyPI — yana-ai
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'py-v')) ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'py-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/yana-ai/
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: "3.12"

      - name: Set version from tag
        run: |
          VERSION="$RAW_VERSION"
          VERSION="${VERSION#py-v}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = .*/__version__ = \"$VERSION\"/" src/yana_ai/__init__.py

      - name: Install build tools
        run: pip install hatchling build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

  publish-npm:
    name: npm — yana-ai
    # The !startsWith(...,'rt-v'/'py-v') guards below are currently
    # always-true once startsWith(ref,'v') is true, since no rt-v/py-v tag
    # can also start with a bare 'v'. Kept as explicit future-proofing in
    # case a fourth axis ever gets a prefix starting with 'v' too.
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'rt-v') && !startsWith(github.ref_name, 'py-v')) ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v') && !startsWith(github.event.release.tag_name, 'rt-v') && !startsWith(github.event.release.tag_name, 'py-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'npm')
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/yana-ai
    # id-token: write is required for npm's OIDC Trusted Publisher flow
    # (npmjs.com package Settings > Trusted Publisher, configured
    # 2026-07-10) — without it GitHub Actions never issues the OIDC token
    # npm needs, and publish falls back to NODE_AUTH_TOKEN below, which
    # started getting rejected with a 403 registry-side even for a
    # verified read-write collaborator using a fresh token (confirmed by
    # reproducing the same 403 from a real `npm login` session locally).
    permissions:
      contents: read
      id-token: write
    env:
      RAW_VERSION: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (node24)
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing needs npm >= 11.5.1; Node 20's bundled npm
      # predates that, so upgrade in-place before the publish step.
      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Set version from tag
        run: |
          VERSION="$RAW_VERSION"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: |
          if npm view "yana-ai@$VERSION" &>/dev/null 2>&1; then
            echo "yana-ai@$VERSION already published, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    name: crates.io — yana-rt
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'rt-v')) ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'rt-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'crates')
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/yana-rt
    env:
      RAW_VERSION: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)

      - uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION="$RAW_VERSION"
          VERSION="${VERSION#rt-v}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (node24)
        with:
          path: ~/.cargo/registry
          key: cargo-publish-${{ hashFiles('Cargo.lock') }}

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
