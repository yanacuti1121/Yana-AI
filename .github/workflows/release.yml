name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: yana-rt
            asset: yana-rt-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: yana-rt
            asset: yana-rt-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: yana-rt
            asset: yana-rt-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: yana-rt.exe
            asset: yana-rt-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.binary }}
          asset_name: ${{ matrix.asset }}
