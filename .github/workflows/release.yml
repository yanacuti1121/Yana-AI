name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)

      - name: Validate semver tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: tag '$TAG' is not strict semver (vX.Y.Z)" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: sudo apt-get install -y jq zip

      - name: Run hook tests
        run: bash core/tests/hooks/run-hook-tests.sh

      - name: Drift check
        run: bash core/scripts/drift-check.sh

      - name: Build release pack
        run: bash core/scripts/build-release.sh "$VERSION"

      - name: Update plugin.json version
        run: |
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json

      - name: Update marketplace.json version
        run: |
          jq --arg v "v$VERSION" '.latest_release = $v' .claude-plugin/marketplace.json > /tmp/marketplace.json
          mv /tmp/marketplace.json .claude-plugin/marketplace.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 (node24)
        with:
          tag_name: ${{ env.TAG }}
          name: "YAMTAM ENGINE ${{ env.TAG }}"
          body: |
            ## YAMTAM ENGINE ${{ env.TAG }}

            Install with:
            ```
            /plugin install phamlongh230-lgtm/yamtam-engine
            ```

            Or manually:
            ```bash
            unzip yamtam-engine-${{ env.VERSION }}-fixed.zip -d /path/to/project/.claude/
            bash /path/to/project/.claude/tests/hooks/run-hook-tests.sh
            ```

            See [ROADMAP.md](https://github.com/phamlongh230-lgtm/yamtam-engine/blob/main/ROADMAP.md) for changelog.
          files: |
            releases/yamtam-engine-v${{ env.VERSION }}-fixed.zip
            releases/yamtam-engine-latest.zip
          fail_on_unmatched_files: true
