name: Sandbox Image

on:
  push:
    branches: [main]
    paths:
      - 'core/sandbox/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build yamtam-sandbox Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (node24)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 (node24)

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 (node24)
        with:
          context: core/sandbox
          file: core/sandbox/Dockerfile.sandbox
          push: false
          tags: yamtam-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — exec
        run: |
          docker run --rm \
            --network none --read-only \
            --tmpfs /workspace:rw,size=64m,noexec \
            --tmpfs /tmp:rw,size=32m,noexec \
            --cap-drop ALL --security-opt no-new-privileges \
            --user nobody \
            yamtam-sandbox:latest echo "smoke test passed"

      - name: Smoke test — network blocked
        run: |
          docker run --rm \
            --network none --read-only \
            --tmpfs /workspace:rw,size=64m,noexec \
            --cap-drop ALL --security-opt no-new-privileges \
            --user nobody \
            yamtam-sandbox:latest \
            bash -c "wget -q http://example.com -O /dev/null 2>&1 && echo FAIL || echo 'network blocked — PASS'"

      - name: Smoke test — filesystem read-only
        run: |
          docker run --rm \
            --network none --read-only \
            --tmpfs /workspace:rw,size=64m,noexec \
            --cap-drop ALL --security-opt no-new-privileges \
            --user nobody \
            yamtam-sandbox:latest \
            bash -c "echo pwned > /etc/pwned 2>&1 && echo FAIL || echo 'read-only FS — PASS'"
